<!DOCTYPE html>
<html lang="en">
<body style="margin: 0; padding: 32px 20px; background: #f7fafc; color: #181c1e; font-family: Arial, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width: 600px; width: 100%; background: #ffffff; border-radius: 12px; overflow: hidden;">
          <tr><td style="height: 6px; background: #875200;"></td></tr>
          <tr>
            <td style="padding: 36px 32px;">
              <h1 style="margin: 0 0 20px; color: #002045; font-size: 26px;">Reset your password</h1>
              <p style="margin: 0 0 16px; line-height: 1.6;">Hello {{ user.get_username }},</p>
              <p style="margin: 0 0 28px; line-height: 1.6;">We received a request to reset your NextStop password. Use the button below to choose a new one.</p>
              <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" style="display: inline-block; padding: 14px 24px; background: #875200; border-radius: 8px; color: #ffffff; font-weight: bold; text-decoration: none;">Reset password</a>
              <p style="margin: 28px 0 0; color: #74777f; font-size: 13px; line-height: 1.6;">If you did not request a password reset, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
